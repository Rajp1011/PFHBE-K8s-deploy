apiVersion: batch/v1
kind: Job
metadata:
  name: ge-config-sync
  namespace: ge-dev
spec:
  template:
    spec:
      containers:
      - name: git-sync
        image: alpine/git:latest
        command:
        - /bin/sh
        - -c
        - |
          set -e
          # 1. Install rsync (Alpine uses apk)
          apk add --no-cache rsync

          # 2. Setup SSH Key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          # 3. Clone the Build repo to a temporary location
          echo "Cloning repository..."
          git clone --depth 1 git@github.com:PongGameStudios/Build.git /tmp/build-repo

          echo "Checking repo structure:"
          ls -R /tmp/build-repo/iGaming

          # 4. Create destination sub-folders if they don't exist
          mkdir -p /mnt/pvc/GEService/Internal
          mkdir -p /mnt/pvc/GEWeb/Internal

          # 5. Smart Sync with rsync
          # This ONLY affects the specific sub-folders. 
          echo "Starting sync for GEService..."
          rsync -av --delete /tmp/build-repo/iGaming/GEService/Internal/ /mnt/pvc/GEService/Internal/

          echo "Starting sync for GEWeb..."
          rsync -av --delete /tmp/build-repo/iGaming/GEWeb/Internal/ /mnt/pvc/GEWeb/Internal/
          
          # 6. Version Tracking
          TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M:%S UTC")
          echo "Last Sync: $TIMESTAMP" > /mnt/pvc/GEService/Internal/sync_info.txt
          echo "Last Sync: $TIMESTAMP" > /mnt/pvc/GEWeb/Internal/sync_info.txt
          
          echo "Sync Complete!"
        env:
        - name: SSH_KEY
          valueFrom:
            secretKeyRef:
              name: github-deploy-key
              key: ssh-privatekey
        volumeMounts:
        - name: storage
          mountPath: /mnt/pvc
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: ge-pvc
      restartPolicy: Never
  backoffLimit: 2