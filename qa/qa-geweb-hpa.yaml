apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ge-web-qa-hpa
  namespace: ge-qa
  labels:
    app: ge-web
    env: qa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ge-web-deployment-qa
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70